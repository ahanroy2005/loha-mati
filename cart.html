<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre Panier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-header">
  <div class="section-eyebrow" data-i18n="nav_shop">Boutique</div>
  <h1 class="section-title" data-i18n="cart_title">Votre Panier</h1>
</div>

<section class="cart-page fade-up">
  <div class="cart-container">
    <table class="cart-table">
      <thead>
        <tr>
          <th data-i18n="nav_shop">Produit</th>
          <th data-i18n="qty" style="text-align:center;">Quantité</th>
          <th data-i18n="total" style="text-align:right;">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr class="cart-item">
          <td>
            <div class="ci-product">
              <div class="ci-img" style="background: linear-gradient(135deg, #3A2010 0%, #6B3A1A 50%, #A85A2A 100%);"></div>
              <div class="ci-info">
                <h4 data-i18n="prod1_name">Danseuse Tribale</h4>
                <p data-i18n="cat_deco">Décoration</p>
                <div class="ci-price">€68</div>
                <button class="ci-remove" data-i18n="remove">Supprimer</button>
              </div>
            </div>
          </td>
          <td style="text-align:center;">
            <div class="qty-btn" style="display:inline-flex;">
              <button onclick="document.getElementById('qty1').innerText = Math.max(1, parseInt(document.getElementById('qty1').innerText) - 1)">-</button>
              <span id="qty1">1</span>
              <button onclick="document.getElementById('qty1').innerText = parseInt(document.getElementById('qty1').innerText) + 1">+</button>
            </div>
          </td>
          <td>
            <div class="ci-total">€68</div>
          </td>
        </tr>
        
        <tr class="cart-item">
          <td>
            <div class="ci-product">
              <div class="ci-img" style="background: linear-gradient(135deg, #1A2A2A 0%, #2A4A3A 50%, #4A7A5A 100%);"></div>
              <div class="ci-info">
                <h4 data-i18n="prod2_name">Éléphant Royal</h4>
                <p data-i18n="cat_sculpture">Sculpture</p>
                <div class="ci-price">€95</div>
                <button class="ci-remove" data-i18n="remove">Supprimer</button>
              </div>
            </div>
          </td>
          <td style="text-align:center;">
            <div class="qty-btn" style="display:inline-flex;">
              <button onclick="document.getElementById('qty2').innerText = Math.max(1, parseInt(document.getElementById('qty2').innerText) - 1)">-</button>
              <span id="qty2">1</span>
              <button onclick="document.getElementById('qty2').innerText = parseInt(document.getElementById('qty2').innerText) + 1">+</button>
            </div>
          </td>
          <td>
            <div class="ci-total">€95</div>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="cart-summary">
      <div class="summary-line">
        <span data-i18n="subtotal">Sous-total</span>
        <span>€163</span>
      </div>
      <div class="summary-line">
        <span data-i18n="footer_shipping">Livraison</span>
        <span>Calculée à l'étape suivante</span>
      </div>
      <div class="summary-total">
        <span data-i18n="total">Total</span>
        <span>€163</span>
      </div>
      <button class="btn-primary checkout-btn" data-i18n="checkout">Valider la commande</button>
    </div>

  </div>
</section>

<script src="main.js"></script>

<!-- ─── SLIDE OUT CART ─── -->
<div class="cart-backdrop" onclick="closeCart()"></div>
<div class="cart-drawer">
  <div class="cart-header">
    <h2 data-i18n="nav_cart">Panier</h2>
    <button class="close-cart-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items">
    <div class="cart-item">
      <img src="DSC00825.JPG" alt="Tribal Dancer">
      <div class="cart-item-details">
        <h4>Tribal Dancer</h4>
        <p>€68</p>
        <div class="cart-qty">
          <button>-</button><span>1</span><button>+</button>
        </div>
      </div>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span>€68</span>
    </div>
    <div class="cart-payments">
      <p style="font-size: 11px; margin-bottom: 8px; color: var(--ink-lt); text-transform: uppercase; letter-spacing: 0.1em;">Express Checkout</p>
      <div class="payment-buttons">
        <button class="pay-btn pay-apple"> Pay</button>
        <button class="pay-btn pay-gpay">

          </svg>
        </button>
      </div>
      <button class="btn-primary" style="width: 100%; margin-top: 12px; border-radius: 4px;">Proceed to Checkout</button>
    </div>
  </div>
</div>

</body>
</html>
