<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .item { text-align: center; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        p { margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="grid" id="gallery"></div>
    <script>
        const files = [
            'DSC00825.JPG', 'DSC00868.JPG', 'DSC00873.JPG', 'DSC00954.JPG', 'DSC01017.JPG',
            'DSC01041.JPG', 'DSC01056.JPG', 'DSC01103.JPG', 'DSC01266.JPG', 'DSC01389.JPG',
            'DSC01474.JPG', 'DSC01487.JPG', 'face/Image-1-1.png.webp',
            'face/Screenshot 2026-04-26 at 1.14.36 AM.png',
            'face/Screenshot 2026-04-26 at 1.14.46 AM.png'
        ];
        const gallery = document.getElementById('gallery');
        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="${file}" alt="${file}"><p>${file}</p>`;
            gallery.appendChild(div);
        });
    </script>
</body>
</html>
