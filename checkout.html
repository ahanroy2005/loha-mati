<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement — Loha Mati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .checkout-page {
    padding: 80px;
    background: var(--cream);
    min-height: 80vh;
  }
  .checkout-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 60px;
  }
  .checkout-form {
    background: var(--white);
    padding: 48px;
  }
  .checkout-summary {
    background: var(--cream-dk);
    padding: 48px;
    align-self: flex-start;
  }
  .form-section {
    margin-bottom: 40px;
  }
  .form-section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--cream-dk);
  }
  .input-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }
  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .input-group label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-lt);
  }
  .input-group input, .input-group select {
    padding: 16px;
    border: 1px solid var(--ink-lt);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--clay);
  }
  .checkout-summary h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .order-item {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .oi-img {
    width: 60px; height: 60px;
    background: var(--clay);
  }
  .oi-details { flex: 1; }
  .oi-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .oi-qty { font-size: 12px; color: var(--ink-lt); }
  .oi-price { font-size: 14px; font-weight: 500; color: var(--ink); }
  
  .summary-line {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--ink-md);
    margin-bottom: 12px;
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--ink);
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.1);
  }
  .pay-btn {
    width: 100%;
    margin-top: 32px;
    padding: 20px;
    font-size: 14px;
  }
  @media (max-width: 900px) {
    .checkout-page { padding: 40px 24px; }
    .checkout-grid { grid-template-columns: 1fr; }
    .checkout-form, .checkout-summary { padding: 24px; }
    .input-row { flex-direction: column; gap: 20px; }
  }
</style>
</head>
<body>

<div class="page-header" style="padding: 40px 80px;">
  <h1 class="section-title">Validation de la commande</h1>
</div>

<section class="checkout-page fade-up">
  <div class="checkout-grid">
    
    <div class="checkout-form">
      <form action="order-confirmation.html">
        <div class="form-section">
          <h3>Informations de contact</h3>
          <div class="input-group" style="margin-bottom: 20px;">
            <label>Adresse e-mail</label>
            <input type="email" required placeholder="nom@exemple.com">
          </div>
        </div>

        <div class="form-section">
          <h3>Adresse de livraison</h3>
          <div class="input-row">
            <div class="input-group">
              <label>Prénom</label>
              <input type="text" required>
            </div>
            <div class="input-group">
              <label>Nom</label>
              <input type="text" required>
            </div>
          </div>
          <div class="input-group" style="margin-bottom: 20px;">
            <label>Adresse</label>
            <input type="text" required placeholder="123 Rue de la République">
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Code Postal</label>
              <input type="text" required placeholder="75001">
            </div>
            <div class="input-group">
              <label>Ville</label>
              <input type="text" required placeholder="Paris">
            </div>
          </div>
          <div class="input-group">
            <label>Pays</label>
            <select required>
              <option value="FR">France</option>
              <option value="BE">Belgique</option>
              <option value="CH">Suisse</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h3>Paiement</h3>
          <div class="input-group" style="margin-bottom: 20px;">
            <label>Numéro de carte</label>
            <input type="text" required placeholder="0000 0000 0000 0000">
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>Date d'expiration</label>
              <input type="text" required placeholder="MM/AA">
            </div>
            <div class="input-group">
              <label>CVC</label>
              <input type="text" required placeholder="123">
            </div>
          </div>
        </div>
        
        <button type="submit" class="btn-primary pay-btn" onclick="event.preventDefault(); window.location.href='order-confirmation.html'">Payer 175,00 €</button>
      </form>
    </div>

    <div class="checkout-summary">
      <h3>Résumé</h3>
      
      <div class="order-item">
        <div class="oi-img" style="background: linear-gradient(135deg, #3A2010 0%, #6B3A1A 50%, #A85A2A 100%);"></div>
        <div class="oi-details">
          <div class="oi-title">Danseuse Tribale</div>
          <div class="oi-qty">Quantité: 1</div>
        </div>
        <div class="oi-price">€68</div>
      </div>
      
      <div class="order-item">
        <div class="oi-img" style="background: linear-gradient(135deg, #1A2A2A 0%, #2A4A3A 50%, #4A7A5A 100%);"></div>
        <div class="oi-details">
          <div class="oi-title">Éléphant Royal</div>
          <div class="oi-qty">Quantité: 1</div>
        </div>
        <div class="oi-price">€95</div>
      </div>

      <div style="margin-top: 32px;">
        <div class="summary-line">
          <span>Sous-total</span>
          <span>€163,00</span>
        </div>
        <div class="summary-line">
          <span>Livraison (Colissimo Standard)</span>
          <span>€12,00</span>
        </div>
        <div class="summary-total">
          <span>Total à payer</span>
          <span>€175,00</span>
        </div>
      </div>
    </div>

  </div>
</section>

<script src="main.js"></script>

<!-- ─── SLIDE OUT CART ─── -->
<div class="cart-backdrop" onclick="closeCart()"></div>
<div class="cart-drawer">
  <div class="cart-header">
    <h2 data-i18n="nav_cart">Panier</h2>
    <button class="close-cart-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items">
    <div class="cart-item">
      <img src="DSC00825.JPG" alt="Tribal Dancer">
      <div class="cart-item-details">
        <h4>Tribal Dancer</h4>
        <p>€68</p>
        <div class="cart-qty">
          <button>-</button><span>1</span><button>+</button>
        </div>
      </div>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span>€68</span>
    </div>
    <div class="cart-payments">
      <p style="font-size: 11px; margin-bottom: 8px; color: var(--ink-lt); text-transform: uppercase; letter-spacing: 0.1em;">Express Checkout</p>
      <div class="payment-buttons">
        <button class="pay-btn pay-apple"> Pay</button>
        <button class="pay-btn pay-gpay">

          </svg>
        </button>
      </div>
      <button class="btn-primary" style="width: 100%; margin-top: 12px; border-radius: 4px;">Proceed to Checkout</button>
    </div>
  </div>
</div>

</body>
</html>
